<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Demo video thumbnail</title>
  <desc id="desc">Clickable thumbnail for the RAG chatbot demo video</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1628"/>
      <stop offset="1" stop-color="#172A46"/>
    </linearGradient>
    <linearGradient id="accent" x1="360" y1="120" x2="920" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4D4D"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1085" cy="118" r="150" fill="#FFB347" fill-opacity="0.10"/>
  <circle cx="196" cy="622" r="200" fill="#FF4D4D" fill-opacity="0.08"/>
  <rect x="110" y="96" width="1060" height="528" rx="36" fill="#0F1A2F" stroke="#2A3958" stroke-width="2" filter="url(#shadow)"/>
  <rect x="146" y="132" width="192" height="56" rx="18" fill="#16243D" stroke="#314363"/>
  <text x="168" y="168" fill="#FFB347" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">DEMO</text>
  <text x="146" y="260" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">RAG Agent</text>
  <text x="146" y="324" fill="#C9D4E5" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400">Upload, retrieve, and chat with a paper</text>
  <text x="146" y="372" fill="#C9D4E5" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400">through a LangGraph workflow.</text>
  <g transform="translate(840 190)">
    <circle cx="140" cy="180" r="136" fill="url(#accent)" fill-opacity="0.14"/>
    <circle cx="140" cy="180" r="102" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M118 142L118 218L186 180L118 142Z" fill="#FFFFFF"/>
  </g>
  <rect x="146" y="464" width="260" height="54" rx="14" fill="#16243D" stroke="#314363"/>
  <text x="168" y="499" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Click to watch the demo</text>
  <text x="146" y="578" fill="#8FA4C4" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400">Readme preview only. The linked MP4 opens the full recording.</text>
</svg>
